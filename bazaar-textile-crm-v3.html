<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar Textile CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root {
  --black: #111110;
  --dark: #1C1B19;
  --charcoal: #2E2D2A;
  --mid: #5C5A54;
  --muted: #9C9A93;
  --light: #D4D1C8;
  --pale: #EEECE6;
  --cream: #F7F5F0;
  --white: #FFFFFF;

  --warm-orange: #C8864A;
  --warm-orange-h: #B5733A;
  --warm-gold: #D4A55A;
  --warm-sand: #E8D5B0;
  --warm-linen: #F2E8D8;
  --warm-deep: #7A4E2A;

  --success: #3D8A5E;
  --success-bg: #EBF5F0;
  --warning: #A0712A;
  --warning-bg: #FBF3E3;
  --danger: #B8392A;
  --danger-bg: #FAEDEB;
  --info: #2A6A9A;
  --info-bg: #E8F2FA;

  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --shadow-sm: 0 1px 3px rgba(17,17,16,0.08);
  --shadow: 0 2px 8px rgba(17,17,16,0.10);
  --shadow-lg: 0 8px 32px rgba(17,17,16,0.14);

  --sidebar-w: 220px;
  --sidebar-w-collapsed: 60px;
  --topbar-h: 56px;
  --transition: 0.22s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  color: var(--dark);
  background: var(--cream);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--light); border-radius: 2px; }

/* ============ UTILS ============ */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-4 { gap: 4px; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.text-muted { color: var(--muted); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.font-500 { font-weight: 500; }
.w-full { width: 100%; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============ BADGE ============ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 500; white-space: nowrap;
}
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.badge-info { background: var(--info-bg); color: var(--info); }
.badge-neutral { background: var(--pale); color: var(--mid); }
.badge-admin { background: #2E2D2A; color: #E8D5B0; }
.badge-super { background: #7A4E2A; color: #F2E8D8; }

/* ============ BUTTON ============ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  transition: all var(--transition); text-decoration: none; white-space: nowrap;
}
.btn-primary {
  background: var(--warm-orange); color: var(--white);
}
.btn-primary:hover { background: var(--warm-orange-h); }
.btn-secondary {
  background: var(--white); color: var(--dark);
  border: 1px solid var(--light);
}
.btn-secondary:hover { background: var(--cream); border-color: var(--muted); }
.btn-ghost { background: transparent; color: var(--mid); }
.btn-ghost:hover { background: var(--pale); color: var(--dark); }
.btn-danger-outline { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger-outline:hover { background: var(--danger-bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon {
  padding: 7px; border-radius: var(--radius); background: transparent;
  border: none; cursor: pointer; color: var(--mid);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.btn-icon:hover { background: var(--pale); color: var(--dark); }
.btn-icon svg { width: 16px; height: 16px; }

/* ============ FORM ============ */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--charcoal); }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--light); border-radius: var(--radius);
  background: var(--white); color: var(--dark);
  font-family: inherit; font-size: 13px;
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--warm-orange); box-shadow: 0 0 0 3px rgba(200,134,74,0.12);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 11px; color: var(--muted); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

/* ============ CARD ============ */
.card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1px solid var(--pale); padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 14px; font-weight: 600; color: var(--dark);
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}

/* ============ TABLE ============ */
.table-wrap { overflow-x: auto; }
.table { width: 100%; border-collapse: collapse; }
.table th {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--pale);
  text-align: left; white-space: nowrap; background: var(--cream);
}
.table td {
  padding: 12px 14px; border-bottom: 1px solid var(--pale);
  font-size: 13px; color: var(--dark); vertical-align: middle;
}
.table tr:last-child td { border-bottom: none; }
.table tbody tr { transition: background var(--transition); cursor: pointer; }
.table tbody tr:hover { background: var(--cream); }

/* ============ STAT CARD ============ */
.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
}
@media (max-width: 900px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }

.stat-card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1px solid var(--pale); padding: 18px 20px;
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 40px; height: 3px; border-radius: 0 2px 0 0;
  background: var(--warm-orange);
}
.stat-num {
  font-size: 28px; font-weight: 600; color: var(--black);
  font-feature-settings: "tnum"; line-height: 1.1;
}
.stat-lbl {
  font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 400;
}
.stat-sub {
  font-size: 11px; color: var(--success); margin-top: 6px; display: flex; align-items: center; gap: 3px;
}

/* ============ LOGIN PAGE ============ */
#page-login {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--black);
  position: relative; overflow: hidden;
}
.login-bg-texture {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(200,134,74,0.04) 60px, rgba(200,134,74,0.04) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(200,134,74,0.04) 60px, rgba(200,134,74,0.04) 61px);
}
.login-side {
  position: absolute; right: 0; top: 0; bottom: 0; width: 42%;
  background: var(--warm-deep); opacity: 0.15; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
}
.login-box {
  position: relative; z-index: 10;
  width: 100%; max-width: 400px; margin: 20px;
  background: var(--dark); border-radius: var(--radius-xl);
  border: 1px solid var(--charcoal); box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.login-header {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--charcoal);
}
.login-logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.login-logo-mark {
  width: 42px; height: 42px; border-radius: var(--radius); overflow: hidden;
  background: var(--warm-orange); display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--white);
  flex-shrink: 0;
}
.login-logo-mark img, .sidebar-logo-mark img { width: 100%; height: 100%; object-fit: cover; }
.login-logo-text { display: flex; flex-direction: column; }
.login-logo-name {
  font-size: 16px; font-weight: 600; color: var(--white); letter-spacing: 0.02em;
}
.login-logo-sub {
  font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px;
}
.login-headline {
  font-size: 13px; color: var(--muted); line-height: 1.5;
}
.login-form-area { padding: 24px 32px 28px; }
.login-form-group { margin-bottom: 16px; }
.login-label { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing: 0.04em; text-transform: uppercase; }
.login-input {
  width: 100%; padding: 11px 14px;
  background: var(--charcoal); border: 1px solid #3D3C38; border-radius: var(--radius);
  color: var(--white); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color var(--transition);
}
.login-input::placeholder { color: var(--mid); }
.login-input:focus { border-color: var(--warm-orange); }
.login-btn {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius);
  background: var(--warm-orange); color: var(--white);
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background var(--transition); margin-top: 8px;
}
.login-btn:hover { background: var(--warm-orange-h); }
.login-error {
  color: #F08070; font-size: 12px; margin-top: 10px; display: none; text-align: center;
}
.login-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 32px; border-top: 1px solid var(--charcoal);
}
.lang-toggle {
  display: flex; gap: 2px; background: var(--charcoal);
  border-radius: var(--radius-sm); padding: 2px;
}
.lang-btn {
  padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all var(--transition); color: var(--muted); border: none; background: transparent;
  font-family: inherit;
}
.lang-btn.active { background: var(--dark); color: var(--white); }
.login-policies { display: flex; gap: 12px; }
.policy-link {
  font-size: 11px; color: var(--mid); cursor: pointer; text-decoration: none;
  transition: color var(--transition);
}
.policy-link:hover { color: var(--warm-gold); }

/* ============ APP SHELL ============ */
#app-shell { display: none; min-height: 100vh; }
#app-shell.visible { display: flex; }

/* ============ SIDEBAR ============ */
.sidebar {
  width: var(--sidebar-w); background: var(--black); flex-shrink: 0;
  display: flex; flex-direction: column;
  transition: width var(--transition), transform var(--transition);
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
  overflow: hidden;
}
.sidebar.collapsed { width: var(--sidebar-w-collapsed); }

.sidebar-brand {
  padding: 18px 16px 14px; border-bottom: 1px solid var(--charcoal);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.sidebar-logo-mark {
  width: 30px; height: 30px; border-radius: var(--radius-sm); overflow: hidden;
  background: var(--warm-orange); display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--white);
  flex-shrink: 0;
}
.sidebar-brand-text { overflow: hidden; }
.sidebar-brand-name { font-size: 13px; font-weight: 600; color: var(--white); white-space: nowrap; }
.sidebar-brand-sub { font-size: 10px; color: var(--mid); white-space: nowrap; margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; overflow-x: hidden; }
.nav-section-label {
  font-size: 10px; font-weight: 600; color: var(--mid); letter-spacing: 0.08em;
  text-transform: uppercase; padding: 8px 10px 4px; white-space: nowrap; overflow: hidden;
  transition: opacity var(--transition);
}
.sidebar.collapsed .nav-section-label { opacity: 0; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius);
  color: var(--muted); cursor: pointer; margin-bottom: 2px;
  transition: all var(--transition); white-space: nowrap; overflow: hidden;
  position: relative;
}
.nav-item:hover { background: var(--charcoal); color: var(--light); }
.nav-item.active { background: rgba(200,134,74,0.15); color: var(--warm-gold); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 2px; border-radius: 0 2px 2px 0; background: var(--warm-orange);
}
.nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
.nav-item-label { font-size: 13px; font-weight: 400; }

.sidebar-bottom {
  padding: 12px 8px; border-top: 1px solid var(--charcoal); flex-shrink: 0;
}
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius); overflow: hidden;
}
.sidebar-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: var(--warm-orange);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: var(--white); flex-shrink: 0;
}
.avatar-edit-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
.avatar-edit-wrap .sidebar-avatar { overflow: hidden; }
.avatar-edit-badge {
  position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px;
  border-radius: 50%; background: var(--warm-orange); border: 2px solid var(--dark);
  display: flex; align-items: center; justify-content: center;
}
.avatar-edit-badge svg { width: 7px; height: 7px; stroke: var(--white); }
.sidebar-user-info { overflow: hidden; }
.sidebar-user-name { font-size: 12px; font-weight: 500; color: var(--light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-role { font-size: 10px; color: var(--mid); white-space: nowrap; }
.sidebar-collapse-btn {
  width: 100%; padding: 7px 10px; margin-top: 6px;
  background: transparent; border: none; cursor: pointer; color: var(--mid);
  display: flex; align-items: center; gap: 10px; border-radius: var(--radius);
  transition: all var(--transition); font-family: inherit; font-size: 12px;
  overflow: hidden; white-space: nowrap;
}
.sidebar-collapse-btn:hover { background: var(--charcoal); color: var(--light); }
.sidebar-collapse-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-collapse-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.sidebar-collapse-btn.hidden { display: none !important; }

/* ============ SYNC BAR ============ */
.sync-bar { margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.08); }
.sync-status { display: flex; align-items: center; gap: 6px; padding: 2px 10px 8px; font-size: 10px; color: var(--mid); white-space: nowrap; overflow: hidden; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sync-dot.online { background: var(--success); }
.sync-dot.syncing { background: var(--warm-gold); animation: syncPulse 1s ease-in-out infinite; }
.sync-dot.error { background: var(--danger); }
.sync-dot.offline { background: var(--muted); }
@keyframes syncPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
.sync-status-text { overflow: hidden; text-overflow: ellipsis; }
.sync-actions { display: flex; flex-direction: column; }
.sync-sql-block { white-space: pre-wrap; background: var(--dark); color: #D4D1C8; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 10.5px; overflow: auto; font-family: 'SF Mono', Consolas, monospace; line-height: 1.6; }

/* ============ MAIN AREA ============ */
.main-area {
  flex: 1; display: flex; flex-direction: column;
  margin-left: var(--sidebar-w); transition: margin-left var(--transition);
  min-width: 0;
}
.main-area.sidebar-collapsed { margin-left: var(--sidebar-w-collapsed); }

/* ============ TOPBAR ============ */
.topbar {
  height: var(--topbar-h); background: var(--white);
  border-bottom: 1px solid var(--pale);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 0 var(--pale);
}
.topbar-hamburger {
  display: none; padding: 6px; border: none; background: transparent;
  cursor: pointer; border-radius: var(--radius); color: var(--mid);
}
.topbar-hamburger svg { width: 20px; height: 20px; display: block; }
.topbar-breadcrumb { display: flex; align-items: center; gap: 6px; flex: 1; }
.topbar-title { font-size: 15px; font-weight: 600; color: var(--dark); }
.topbar-sub { font-size: 12px; color: var(--muted); }
.topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.topbar-lang {
  display: flex; gap: 2px; background: var(--pale); border-radius: var(--radius-sm); padding: 2px;
}
.topbar-lang-btn {
  padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all var(--transition); color: var(--muted); border: none; background: transparent;
  font-family: inherit;
}
.topbar-lang-btn.active { background: var(--white); color: var(--dark); box-shadow: var(--shadow-sm); }

/* ============ PAGE CONTENT ============ */
.page-content {
  flex: 1; padding: 24px; overflow-y: auto;
}
@media (max-width: 768px) { .page-content { padding: 16px; } }
@media (max-width: 480px) { .page-content { padding: 12px; } }

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-header-left { display: flex; flex-direction: column; gap: 2px; }
.page-h1 { font-size: 20px; font-weight: 600; color: var(--black); }
.page-desc { font-size: 13px; color: var(--muted); }

/* ============ SEARCH & FILTER ============ */
.search-bar {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.search-input-wrap { position: relative; flex: 1; min-width: 200px; }
.search-input-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--muted); pointer-events: none;
}
.search-input {
  width: 100%; padding: 9px 12px 9px 34px;
  border: 1px solid var(--light); border-radius: var(--radius);
  background: var(--white); font-family: inherit; font-size: 13px; outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--warm-orange); }
.filter-select {
  padding: 8px 12px; border: 1px solid var(--light); border-radius: var(--radius);
  background: var(--white); font-family: inherit; font-size: 13px; outline: none; cursor: pointer; color: var(--dark);
}
.filter-select:focus { border-color: var(--warm-orange); }

/* ============ CUSTOMER AVATAR ============ */
.cust-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--white); flex-shrink: 0;
}
.avatar-colors {
  --c0: #C8864A; --c1: #5C8A6A; --c2: #4A70A8; --c3: #9A5E9A; --c4: #7A6A4A; --c5: #5A8A9A;
}

/* ============ DETAIL PANEL ============ */
.detail-panel {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 420px; max-width: 95vw;
  background: var(--white); border-left: 1px solid var(--pale);
  box-shadow: var(--shadow-lg); z-index: 200;
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.3s ease;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel-overlay {
  position: fixed; inset: 0; background: rgba(17,17,16,0.4);
  z-index: 199; display: none;
}
.detail-panel-overlay.visible { display: block; }
.detail-header {
  padding: 18px 20px; border-bottom: 1px solid var(--pale);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.detail-company-name { font-size: 16px; font-weight: 600; color: var(--black); }
.detail-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.detail-body { flex: 1; overflow-y: auto; padding: 20px; }
.detail-section { margin-bottom: 24px; }
.detail-section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--pale);
}
.detail-field { display: flex; gap: 8px; margin-bottom: 10px; }
.detail-field-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; padding-top: 1px; }
.detail-field-val { font-size: 13px; color: var(--dark); flex: 1; }
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item {
  display: flex; gap: 12px; padding-bottom: 16px; position: relative;
}
.timeline-item::before {
  content: ''; position: absolute; left: 7px; top: 18px; bottom: 0;
  width: 1px; background: var(--pale);
}
.timeline-item:last-child::before { display: none; }
.timeline-dot {
  width: 16px; height: 16px; border-radius: 50%; background: var(--warm-sand);
  border: 2px solid var(--warm-orange); flex-shrink: 0; margin-top: 2px;
}
.timeline-content { flex: 1; min-width: 0; }
.timeline-date { font-size: 11px; color: var(--muted); }
.timeline-text { font-size: 13px; color: var(--dark); margin-top: 2px; }
.detail-footer {
  padding: 14px 20px; border-top: 1px solid var(--pale);
  display: flex; gap: 8px; flex-wrap: wrap;
}

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(17,17,16,0.5);
  z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: var(--radius-xl);
  padding: 28px; max-width: 560px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-size: 16px; font-weight: 600; color: var(--black); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ============ POLICY MODAL ============ */
.policy-content { font-size: 13px; color: var(--dark); line-height: 1.8; max-height: 60vh; overflow-y: auto; }
.policy-content h3 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: var(--black); }
.policy-content p { margin-bottom: 10px; color: var(--mid); }

/* ============ MOBILE OVERLAY NAV ============ */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99;
  display: none;
}
.sidebar-overlay.visible { display: block; }

/* ============ TOAST ============ */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.toast {
  background: var(--dark); color: var(--white);
  padding: 11px 16px; border-radius: var(--radius);
  font-size: 13px; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;
  animation: slideIn 0.3s ease;
  border-left: 3px solid var(--warm-orange);
}
.toast.success { border-left-color: var(--success); }
.toast.danger { border-left-color: var(--danger); }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============ PROGRESS BAR FAKE ============ */
.progress-wrap { background: var(--pale); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; background: var(--warm-orange); transition: width 0.3s; }

/* ============ RESPONSIVE BREAKPOINTS ============ */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    width: var(--sidebar-w) !important;
    box-shadow: var(--shadow-lg);
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .main-area { margin-left: 0 !important; }
  .topbar-hamburger { display: flex; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .detail-panel { width: 100%; }
  .topbar-lang { display: none; }
  .page-header { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .stat-grid { gap: 10px; }
  .stat-num { font-size: 22px; }
  .page-h1 { font-size: 17px; }
  .modal { padding: 20px; }
  .login-box { margin: 12px; }
  .login-header, .login-form-area { padding-left: 20px; padding-right: 20px; }
  .login-footer { padding-left: 20px; padding-right: 20px; flex-wrap: wrap; gap: 8px; }
}

/* ============ EMPTY STATE ============ */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-size: 15px; font-weight: 500; color: var(--mid); margin-bottom: 6px; }
.empty-desc { font-size: 13px; }

/* ============ TABS ============ */
.tab-list {
  display: flex; gap: 0; border-bottom: 1px solid var(--pale); margin-bottom: 24px; overflow-x: auto;
}
.tab-item {
  padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--muted);

}
.tab-item:hover { color: var(--dark); }
.tab-item.active { color: var(--warm-orange); border-bottom-color: var(--warm-orange); }

/* ============ ACCOUNT CARD ============ */
.account-row {
  display: flex; align-items: center; gap: 12px;

function el(id) { return document.getElementById(id); }
const CRM_STORAGE_KEY = 'bazaar_textile_crm_v1';
function persistLocalOnly() {
  try {
    const data = {
      lang: STATE.lang,
      settings: STATE.settings,
      accounts: STATE.accounts,
      customers: STATE.customers,
      _syncUpdatedAt: STATE._syncUpdatedAt || 0
    };
    localStorage.setItem(CRM_STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('CRM save skipped:', e);
  }
}
function saveCRM() {
  STATE._syncUpdatedAt = Date.now();
  persistLocalOnly();
  schedulePush();
}
function loadCRM() {
  try {
    const raw = localStorage.getItem(CRM_STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.lang) STATE.lang = data.lang;
    if (data.settings) STATE.settings = { ...STATE.settings, ...data.settings };
    if (Array.isArray(data.accounts) && data.accounts.length) STATE.accounts = data.accounts;
    if (Array.isArray(data.customers)) STATE.customers = data.customers;
    if (data._syncUpdatedAt) STATE._syncUpdatedAt = data._syncUpdatedAt;
  } catch (e) {
    console.warn('CRM load skipped:', e);
  }
}

/* ============================================================
   SUPABASE SYNC
   ============================================================
   Data model: a single table (default name "crm_sync") with one row
   per deployment, storing the whole CRM state as JSON:
     id text primary key, payload jsonb, updated_at timestamptz
   The whole app (settings + accounts + customers) is synced as one
   JSON blob using last-write-wins conflict resolution by timestamp.
*/
const SUPA_CFG_KEY = 'bazaar_textile_supabase_cfg_v1';
const SUPA_CONFIG_FILE = './supabase-config.json';
let SUPA = { url: '', anonKey: '', table: 'crm_sync', rowId: 'default', configured: false };
let supaPushTimer = null;
let supaPullInterval = null;

function loadSupaConfig() {
  try {
    const raw = localStorage.getItem(SUPA_CFG_KEY);
    if (!raw) return;
    const cfg = JSON.parse(raw);
    if (cfg && cfg.url && cfg.anonKey) {
      SUPA = { url: cfg.url.replace(/\/$/, ''), anonKey: cfg.anonKey, table: cfg.table || 'crm_sync', rowId: cfg.rowId || 'default', configured: true };
    }
  } catch (e) { console.warn('Supabase config load skipped:', e); }
}
function saveSupaConfig(cfg) {
  SUPA = { url: cfg.url.replace(/\/$/, ''), anonKey: cfg.anonKey, table: cfg.table || 'crm_sync', rowId: cfg.rowId || 'default', configured: true };
  try { localStorage.setItem(SUPA_CFG_KEY, JSON.stringify(SUPA)); } catch (e) { console.warn('Supabase config save skipped:', e); }
}
function clearSupaConfig() {
  SUPA = { url: '', anonKey: '', table: 'crm_sync', rowId: 'default', configured: false };
  try { localStorage.removeItem(SUPA_CFG_KEY); } catch (e) {}
}
// Auto-bootstrap: if this device has never been configured, look for a
// supabase-config.json file hosted alongside the HTML file so every
// device/browser picks up the same connection automatically.
async function tryAutoLoadConfigFile() {
  if (SUPA.configured) return;
  try {
    const res = await fetch(SUPA_CONFIG_FILE, { cache: 'no-store' });
    if (!res.ok) return;
    const cfg = await res.json();
    if (cfg && cfg.url && cfg.anonKey) saveSupaConfig(cfg);
  } catch (e) { /* file not present or blocked (e.g. file:// origin) — ignore */ }
}
function supaHeaders(extra) {
  return Object.assign({
    'apikey': SUPA.anonKey,
    'Authorization': 'Bearer ' + SUPA.anonKey,
    'Content-Type': 'application/json'
  }, extra || {});
}
function setSyncStatus(status) {
  STATE.syncStatusVal = status;
  const dot = el('sync-dot'), text = el('sync-status-text');
  if (!dot || !text) return;
  dot.className = 'sync-dot' + (status ? ' ' + status : '');
  if (!SUPA.configured) { text.textContent = t('syncNotConfigured'); return; }
  const map = { online: t('syncOnline'), syncing: t('syncSyncing'), error: t('syncError'), offline: t('syncOffline') };
  text.textContent = map[status] || t('syncOffline');
}
function renderSyncBar() {
  const settingsBtn = el('btn-sync-settings');
  if (settingsBtn) settingsBtn.classList.toggle('hidden', !isSuperAdmin());
  const lblSettings = el('lbl-sync-settings'); if (lblSettings) lblSettings.textContent = t('syncSettingsBtn');
  const lblRefresh = el('lbl-sync-refresh'); if (lblRefresh) lblRefresh.textContent = t('syncRefresh');
  setSyncStatus(SUPA.configured ? (STATE.syncStatusVal === 'syncing' ? 'syncing' : 'online') : 'offline');
}
// Apply a payload pulled from Supabase into local STATE, keeping the
// current session valid (or logging out if the account was removed).
function applyRemotePayload(payload, remoteUpdated) {
  if (payload.settings) STATE.settings = { ...STATE.settings, ...payload.settings };
  if (Array.isArray(payload.accounts) && payload.accounts.length) STATE.accounts = payload.accounts;
  if (Array.isArray(payload.customers)) STATE.customers = payload.customers;
  STATE._syncUpdatedAt = remoteUpdated;
  normalizeData();
  persistLocalOnly();
  if (STATE.currentUser) {
    const fresh = STATE.accounts.find(a => a.id === STATE.currentUser.id || a.username === STATE.currentUser.username);
    if (!fresh || fresh.status !== 'active') {
      showToast(t('accountDisabledLoggedOut'), 'danger');
      doLogout();
      return;
    }
    STATE.currentUser = fresh;
    renderLogo();
    updateSidebarLabels();
    renderPage(STATE.currentPage);
  } else {
    if (el('login-company-name')) {
      el('login-company-name').textContent = STATE.settings.companyName;
      el('login-company-sub').textContent = STATE.settings.companySub;
      el('login-tagline').textContent = STATE.settings.tagline;
      renderLogo();
    }
  }
}
async function pullFromSupabase(opts) {
  opts = opts || {};
  if (!SUPA.configured) return false;
  if (!opts.silent) setSyncStatus('syncing');
  try {
    const url = `${SUPA.url}/rest/v1/${SUPA.table}?id=eq.${encodeURIComponent(SUPA.rowId)}&select=*`;
    const res = await fetch(url, { headers: supaHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (Array.isArray(rows) && rows.length) {
      const row = rows[0];
      const payload = row.payload || {};
      const remoteUpdated = row.updated_at ? new Date(row.updated_at).getTime() : 0;
      const localUpdated = STATE._syncUpdatedAt || 0;
      if (remoteUpdated > localUpdated) applyRemotePayload(payload, remoteUpdated);
    }
    setSyncStatus('online');
    return true;
  } catch (e) {
    console.warn('Supabase pull failed:', e);
    setSyncStatus('error');
    return false;
  }
}
function schedulePush() {
  if (!SUPA.configured) return;
  clearTimeout(supaPushTimer);
  supaPushTimer = setTimeout(pushToSupabase, 1200);
}
async function pushToSupabase() {
  if (!SUPA.configured) return false;
  setSyncStatus('syncing');
  const payload = { settings: STATE.settings, accounts: STATE.accounts, customers: STATE.customers };
  const body = [{ id: SUPA.rowId, payload, updated_at: new Date(STATE._syncUpdatedAt || Date.now()).toISOString() }];
  try {
    const url = `${SUPA.url}/rest/v1/${SUPA.table}?on_conflict=id`;
    const res = await fetch(url, {
      method: 'POST',
      headers: supaHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('online');
    return true;
  } catch (e) {
    console.warn('Supabase push failed:', e);
    setSyncStatus('error');
    return false;
  }
}
function startAutoSync() {
  stopAutoSync();
  if (!SUPA.configured) return;
  supaPullInterval = setInterval(() => { if (STATE.currentUser) pullFromSupabase({ silent: true }); }, 25000);
}
function stopAutoSync() {
  if (supaPullInterval) { clearInterval(supaPullInterval); supaPullInterval = null; }
}
async function manualRefreshSync() {
  if (!SUPA.configured) { showToast(t('syncNotConfiguredMsg'), 'warning'); return; }
  showToast(t('syncRefreshing'));
  const ok = await pullFromSupabase();
  showToast(ok ? t('syncRefreshDone') : t('syncRefreshFailed'), ok ? 'success' : 'danger');
}

function readSyncForm() {
  return {
    url: (el('sb-url').value || '').trim().replace(/\/$/, ''),
    anonKey: (el('sb-key').value || '').trim(),
    table: (el('sb-table').value || '').trim() || 'crm_sync',
    rowId: 'default'
  };
}
async function testSupabaseConnection() {
  const cfg = readSyncForm();
  const resultEl = el('sync-test-result');
  if (!cfg.url || !cfg.anonKey) { resultEl.innerHTML = `<span style="color:var(--danger)">${t('syncFillRequired')}</span>`; return; }
  resultEl.innerHTML = `<span style="color:var(--mid)">${t('syncTesting')}</span>`;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/${cfg.table}?limit=1`, { headers: { apikey: cfg.anonKey, Authorization: 'Bearer ' + cfg.anonKey } });
    if (res.ok) { resultEl.innerHTML = `<span style="color:var(--success)">${t('syncTestOk')}</span>`; }
    else { resultEl.innerHTML = `<span style="color:var(--danger)">${t('syncTestFail')} (${res.status})</span>`; }
  } catch (e) {
    resultEl.innerHTML = `<span style="color:var(--danger)">${t('syncTestFail')}</span>`;
  }
}
async function saveSyncSettingsForm() {
  const cfg = readSyncForm();
  if (!cfg.url || !cfg.anonKey) { showToast(t('syncFillRequired'), 'danger'); return; }
  saveSupaConfig(cfg);
  closeModal();
  renderSyncBar();
  showToast(t('syncConfigSaved'), 'success');
  STATE._syncUpdatedAt = Date.now();
  persistLocalOnly();
  await pushToSupabase();
  await pullFromSupabase();
  startAutoSync();
}
function disconnectSupabase() {
  clearSupaConfig();
  stopAutoSync();
  closeModal();
  renderSyncBar();
  showToast(t('syncDisconnected'));
}
function exportSupabaseConfigFile() {
  const cfg = readSyncForm();
  if (!cfg.url || !cfg.anonKey) { showToast(t('syncFillRequired'), 'danger'); return; }
  const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'supabase-config.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast(t('syncExportDone'), 'success');
}
function genId(prefix) { return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
// Migration: make sure every follow-up entry has an id + author, and every account has an avatar slot
function normalizeData() {
  STATE.accounts.forEach(a => { if (a.avatar === undefined) a.avatar = null; });
  STATE.customers.forEach(c => {
    if (!Array.isArray(c.timeline)) c.timeline = [];
    c.timeline.forEach(tl => {
      if (!tl.id) tl.id = genId('tl');
      if (!tl.authorId) { tl.authorId = c.salesId; tl.authorName = salesName(c.salesId) || t('admin'); }
      if (!tl.createdAt) tl.createdAt = tl.date;
    });
    // newest first
    c.timeline.sort((a,b) => (b.createdAt||b.date).localeCompare(a.createdAt||a.date));
  });
}

function avatarColor(str) {
  const colors = ['#C8864A','#5C8A6A','#4A70A8','#9A5E9A','#7A6A4A','#5A8A9A','#A85E4A','#6A8A5A'];
  let h = 0; for (let c of str) h = c.charCodeAt(0) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function statusBadge(status) {
  const map = { new: 'info', following: 'warning', closed: 'success', lost: 'neutral' };

}
function roleBadge(role) {

  if (role === 'admin') return `<span class="badge badge-admin">${t('admin')}</span>`;
  return `<span class="badge badge-neutral">${t('sales')}</span>`;
}
function isAdmin() { return STATE.currentUser && (STATE.currentUser.role === 'admin' || STATE.currentUser.role === 'superadmin'); }
function isSuperAdmin() { return STATE.currentUser && STATE.currentUser.role === 'superadmin'; }

function accountAvatarHTML(acc, size) {

function renderSidebarAvatar() {

  if (!u) return;

  if (u.avatar) { box.innerHTML = `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;">`; }
  else { box.innerHTML = ''; box.textContent = initials(u.name); }
}
function openAvatarUpload() { el('avatar-file-input').click(); }
function handleAvatarFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'danger'); input.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    // Downscale via canvas so large photos don't bloat storage
    const img = new Image();
    img.onload = function() {
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size / img.width, size / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      const resized = canvas.toDataURL('image/jpeg', 0.85);
      STATE.currentUser.avatar = resized;
      const acc = STATE.accounts.find(a => a.id === STATE.currentUser.id);
      if (acc) acc.avatar = resized;
      saveCRM();
      renderSidebarAvatar();
      if (STATE.currentPage === 'accounts') renderAccounts();
      showToast(t('avatarUpdated') || 'Avatar updated', 'success');
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
  input.value = '';
}
function showToast(msg, type = '') {
  const d = document.createElement('div');
  d.className = 'toast ' + type;
  d.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
  el('toast-container').appendChild(d);
  setTimeout(() => d.remove(), 3200);
}

async function doLogin() {
  const u = el('login-username').value.trim();
  const p = el('login-password').value;
  const loginBtn = el('lbl-login-btn');
  if (SUPA.configured) {
    const original = loginBtn.textContent;
    loginBtn.textContent = t('syncSigningIn');
    loginBtn.disabled = true;
    await pullFromSupabase({ silent: true });
    loginBtn.textContent = original;
    loginBtn.disabled = false;
  }
  const acc = STATE.accounts.find(a => a.username === u && a.password === p && a.status === 'active');
  if (!acc) {
    el('login-error').style.display = 'block';
    el('login-username').style.borderColor = '#c0392b';
    return;
  }
  STATE.currentUser = acc;
  el('login-error').style.display = 'none';
  el('page-login').style.display = 'none';
  el('app-shell').classList.add('visible');
  initApp();
  startAutoSync();
}
el('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  STATE.currentUser = null;
  stopAutoSync();
  el('app-shell').classList.remove('visible');
  el('page-login').style.display = 'flex';
  el('login-username').value = '';
  el('login-password').value = '';
  el('login-username').style.borderColor = '';
}

function csvEscape(v) {
  const s = (v === undefined || v === null) ? '' : String(v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function exportCustomersCSV() {
  if (!isSuperAdmin()) { showToast('Only the super admin can export data', 'danger'); return; }
  const headers = ['Company','Country','Type','Contact','Email','Phone','WeChat/WhatsApp','Status','Product Interest','Assigned To','Notes','Created At','Follow-Up Count','Latest Follow-Up'];
  const rows = STATE.customers.map(c => {
    const latest = (c.timeline && c.timeline[0]) ? `${c.timeline[0].date} - ${c.timeline[0].text}` : '';
    return [c.company, c.country, c.type, c.contact, c.email, c.phone, c.wechat, t('status_'+c.status)||c.status, c.product, salesName(c.salesId), c.note, c.createdAt, (c.timeline||[]).length, latest];
  });
  let csv = '\uFEFF' + headers.map(csvEscape).join(',') + '\r\n';
  rows.forEach(r => { csv += r.map(csvEscape).join(',') + '\r\n'; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${STATE.settings.companyName.replace(/\s+/g,'_')}_customers_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(t('exportCustomers') + ' ✓', 'success');
}

            <div id="settings-logo-preview" style="width:56px;height:56px;border-radius:var(--radius);overflow:hidden;background:var(--warm-orange);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:#fff;flex-shrink:0;">${s.logo ? `<img src="${s.logo}" style="width:100%;height:100%;object-fit:cover;">` : 'B'}</div>
            <div style="display:flex;gap:8px;">
              <button type="button" class="btn btn-secondary btn-sm" onclick="el('logo-file-input').click()">${t('uploadLogo')}</button>
              ${s.logo ? `<button type="button" class="btn btn-danger-outline btn-sm" onclick="removeLogo()">${t('removeLogo')}</button>` : ''}
            </div>
            <input type="file" id="logo-file-input" accept="image/*" style="display:none" onchange="handleLogoFile(this)">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">${t('companyNameLabel')}</label>
            <input class="form-input" id="s-name" value="${s.companyName}"></div>
          <div class="form-group"><label class="form-label">${t('taglineLabel')}</label>
            <input class="form-input" id="s-sub" value="${s.companySub}"></div>
        </div>
        <div class="form-group"><label class="form-label">Login Tagline</label>
          <input class="form-input" id="s-tagline" value="${s.tagline}"></div>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-card-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warm-orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
        <div class="settings-card-title">${t('headerFooter')}</div>
      </div>
      <div class="settings-card-body">
        <div class="form-group" style="margin-bottom:14px;"><label class="form-label">${t('headerTextLabel')}</label>
          <input class="form-input" id="s-header" value="${s.headerText}"></div>
        <div class="form-group"><label class="form-label">${t('footerTextLabel')}</label>
          <input class="form-input" id="s-footer" value="${s.footerText}"></div>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-card-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warm-orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <div class="settings-card-title">${t('policies')}</div>
      </div>
      <div class="settings-card-body">
        <div class="form-group" style="margin-bottom:14px;"><label class="form-label">${t('privacyPolicyContent')}</label>
          <textarea class="form-textarea" id="s-privacy" style="min-height:120px;font-size:12px;">${s.privacyPolicy}</textarea></div>
        <div class="form-group"><label class="form-label">${t('securityPolicyContent')}</label>
          <textarea class="form-textarea" id="s-security" style="min-height:120px;font-size:12px;">${s.securityPolicy}</textarea></div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-primary" onclick="saveSettings()">${t('saveSettings')}</button>
    </div>
  `;
}

function saveSettings() {
  STATE.settings.companyName = el('s-name').value;
  STATE.settings.companySub = el('s-sub').value;
  STATE.settings.tagline = el('s-tagline').value;
  STATE.settings.headerText = el('s-header').value;
  STATE.settings.footerText = el('s-footer').value;
  STATE.settings.privacyPolicy = el('s-privacy').value;
  STATE.settings.securityPolicy = el('s-security').value;
  saveCRM();
  // Update login page
  el('login-company-name').textContent = STATE.settings.companyName;
  el('login-company-sub').textContent = STATE.settings.companySub;
  el('login-tagline').textContent = STATE.settings.tagline;
  const brandName = document.querySelector('.sidebar-brand-name');
  const brandSub = document.querySelector('.sidebar-brand-sub');
  if (brandName) brandName.textContent = STATE.settings.companyName;
  if (brandSub) brandSub.textContent = STATE.settings.companySub;
  showToast(t('settingsSaved'), 'success');
}

function saveMyCredentials() {
  const me = STATE.currentUser;
  const curPass = el('acc-cur-pass').value;
  const newUser = el('acc-new-user').value.trim();
  const newPass = el('acc-new-pass').value;
  const confPass = el('acc-conf-pass').value;
  if (!curPass || curPass !== me.password) { showToast(t('wrongCurrentPassword'), 'danger'); return; }
  if (!newUser) { showToast(t('usernameRequired'), 'danger'); return; }
  if (STATE.accounts.find(a => a.username === newUser && a.id !== me.id)) { showToast(t('usernameTakenMsg'), 'danger'); return; }
  if (newPass && newPass !== confPass) { showToast(t('passwordMismatchMsg'), 'danger'); return; }
  me.username = newUser;
  if (newPass) me.password = newPass;
  saveCRM();
  el('acc-cur-pass').value = ''; el('acc-new-pass').value = ''; el('acc-conf-pass').value = '';
  updateSidebarLabels();
  showToast(t('credentialsSavedMsg'), 'success');
}
function handleLogoFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'danger'); input.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size / img.width, size / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      STATE.settings.logo = canvas.toDataURL('image/png');
      saveCRM();
      renderLogo();
      renderSettings();
      showToast(t('logoUpdated'), 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}
function removeLogo() {
  STATE.settings.logo = null;
  saveCRM();
  renderLogo();
  renderSettings();
  showToast(t('logoUpdated'));
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal() {
  el('modal-overlay').classList.add('open');
}
function closeModal() {
  el('modal-overlay').classList.remove('open');
}
el('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ============================================================
   POLICY MODAL
   ============================================================ */
function showPolicy(type) {
  el('modal-title').textContent = type === 'privacy' ? t('privacy') : t('security');
  el('modal-body').innerHTML = `<div class="policy-content">${type === 'privacy' ? STATE.settings.privacyPolicy : STATE.settings.securityPolicy}</div>`;
  el('modal-footer').innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">${t('close')}</button>`;
  openModal();
}

/* ============================================================
   INIT
   ============================================================ */
function initApp() {
  saveCRM();
  renderLogo();
  renderSidebarAvatar();
  el('sidebar-username').textContent = STATE.currentUser.name;
  el('sidebar-role').textContent = t(STATE.currentUser.role === 'superadmin' ? 'superAdmin' : STATE.currentUser.role === 'admin' ? 'admin' : 'sales');
  STATE.currentPage = 'dashboard';
  renderSidebar();
  renderSyncBar();
  renderDashboard();
  el('topbar-title').textContent = t('nav_dashboard');
  el('lbl-logout').textContent = t('signOut');
  // Update lang toggles
  document.querySelectorAll('.topbar-lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (STATE.lang === 'zh' ? '中文' : 'EN'));
  });
}

loadCRM();
normalizeData();
loadSupaConfig();
el('login-company-name').textContent = STATE.settings.companyName;
el('login-company-sub').textContent = STATE.settings.companySub;
el('login-tagline').textContent = STATE.settings.tagline;
renderLogo();
setLang(STATE.lang);
renderSyncBar();

// Bootstrap Supabase sync: auto-pick-up a hosted config file (if any),
// then silently pull the latest data so account credentials are fresh
// even before anyone signs in on this device.
(async function bootstrapSync() {
  await tryAutoLoadConfigFile();
  renderSyncBar();
  if (SUPA.configured) {
    await pullFromSupabase({ silent: true });
  }
})();

// Enter key on login
el('login-username').addEventListener('keydown', e => { if (e.key === 'Enter') el('login-password').focus(); });
</script>
</body>
</html>
