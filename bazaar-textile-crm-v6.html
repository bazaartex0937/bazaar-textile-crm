<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar Textile CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --black:#111110;--dark:#1C1B19;--charcoal:#2E2D2A;--mid:#5C5A54;
  --muted:#9C9A93;--light:#D4D1C8;--pale:#EEECE6;--cream:#F7F5F0;--white:#FFFFFF;
  --warm-orange:#C8864A;--warm-orange-h:#B5733A;--warm-gold:#D4A55A;
  --warm-sand:#E8D5B0;--warm-linen:#F2E8D8;--warm-deep:#7A4E2A;
  --success:#3D8A5E;--success-bg:#EBF5F0;
  --warning:#A0712A;--warning-bg:#FBF3E3;
  --danger:#B8392A;--danger-bg:#FAEDEB;
  --info:#2A6A9A;--info-bg:#E8F2FA;
  --r-sm:4px;--r:8px;--r-lg:12px;--r-xl:16px;
  --sh-sm:0 1px 3px rgba(17,17,16,.08);
  --sh:0 2px 8px rgba(17,17,16,.10);
  --sh-lg:0 8px 32px rgba(17,17,16,.14);
  --sw:220px;--sw-c:60px;--tbh:56px;--tr:.22s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;font-size:14px;color:var(--dark);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--light);border-radius:2px;}

/* ============ UTILS ============ */
.hidden{display:none!important;}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ============ BADGE ============ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-success{background:var(--success-bg);color:var(--success);}
.badge-warning{background:var(--warning-bg);color:var(--warning);}
.badge-danger{background:var(--danger-bg);color:var(--danger);}
.badge-info{background:var(--info-bg);color:var(--info);}
.badge-neutral{background:var(--pale);color:var(--mid);}
.badge-admin{background:#2E2D2A;color:#E8D5B0;}
.badge-super{background:#7A4E2A;color:#F2E8D8;}

/* ============ BUTTON ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all var(--tr);text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--warm-orange);color:var(--white);}
.btn-primary:hover{background:var(--warm-orange-h);}
.btn-secondary{background:var(--white);color:var(--dark);border:1px solid var(--light);}
.btn-secondary:hover{background:var(--cream);border-color:var(--muted);}
.btn-ghost{background:transparent;color:var(--mid);}
.btn-ghost:hover{background:var(--pale);color:var(--dark);}
.btn-danger-outline{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-danger-outline:hover{background:var(--danger-bg);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{padding:7px;border-radius:var(--r);background:transparent;border:none;cursor:pointer;color:var(--mid);display:inline-flex;align-items:center;justify-content:center;transition:all var(--tr);}
.btn-icon:hover{background:var(--pale);color:var(--dark);}
.btn-icon svg{width:16px;height:16px;}
.btn:disabled,.btn[disabled]{opacity:.5;cursor:not-allowed;}

/* ============ FORM ============ */
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;font-weight:500;color:var(--charcoal);}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--light);border-radius:var(--r);background:var(--white);color:var(--dark);font-family:inherit;font-size:13px;transition:border-color var(--tr),box-shadow var(--tr);outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--warm-orange);box-shadow:0 0 0 3px rgba(200,134,74,.12);}
.form-textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}

/* ============ CARD ============ */
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--pale);padding:20px;box-shadow:var(--sh-sm);}
.card-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* ============ TABLE ============ */
.table-wrap{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;}
.table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--pale);text-align:left;white-space:nowrap;background:var(--cream);}
.table td{padding:12px 14px;border-bottom:1px solid var(--pale);font-size:13px;color:var(--dark);vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tbody tr{transition:background var(--tr);cursor:pointer;}
.table tbody tr:hover{background:var(--cream);}

/* ============ STAT GRID ============ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr 1fr;gap:10px;}}
.stat-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--pale);padding:18px 20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;width:40px;height:3px;border-radius:0 2px 0 0;background:var(--warm-orange);}
.stat-num{font-size:28px;font-weight:600;color:var(--black);font-feature-settings:"tnum";line-height:1.1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-sub{font-size:11px;color:var(--success);margin-top:6px;}

/* ============ LOGIN ============ */
#page-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);position:relative;overflow:hidden;}
.login-bg-texture{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,134,74,.04) 60px,rgba(200,134,74,.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,134,74,.04) 60px,rgba(200,134,74,.04) 61px);}
.login-side{position:absolute;right:0;top:0;bottom:0;width:42%;background:var(--warm-deep);opacity:.15;clip-path:polygon(15% 0,100% 0,100% 100%,0% 100%);}
.login-box{position:relative;z-index:10;width:100%;max-width:400px;margin:20px;background:var(--dark);border-radius:var(--r-xl);border:1px solid var(--charcoal);box-shadow:var(--sh-lg);overflow:hidden;}
.login-header{padding:32px 32px 24px;border-bottom:1px solid var(--charcoal);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.login-logo-mark{width:42px;height:42px;border-radius:var(--r);overflow:hidden;background:var(--warm-orange);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--white);flex-shrink:0;}
.login-logo-mark img,.sidebar-logo-mark img{width:100%;height:100%;object-fit:cover;}
.login-logo-name{font-size:16px;font-weight:600;color:var(--white);letter-spacing:.02em;}
.login-logo-sub{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.login-headline{font-size:12px;color:#5C5A54;line-height:1.5;}
.login-form-area{padding:24px 32px 28px;}
.login-form-group{margin-bottom:16px;}
.login-label{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.04em;text-transform:uppercase;}
.login-input{width:100%;padding:11px 14px;background:var(--charcoal);border:1px solid #3D3C38;border-radius:var(--r);color:var(--white);font-family:inherit;font-size:14px;outline:none;transition:border-color var(--tr);}
.login-input::placeholder{color:var(--mid);}
.login-input:focus{border-color:var(--warm-orange);}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--r);background:var(--warm-orange);color:var(--white);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background var(--tr);margin-top:8px;}
.login-btn:hover:not(:disabled){background:var(--warm-orange-h);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-error{color:#F08070;font-size:12px;margin-top:10px;display:none;text-align:center;}
.login-footer{display:flex;justify-content:space-between;align-items:center;padding:14px 32px;border-top:1px solid var(--charcoal);}
.lang-toggle{display:flex;gap:2px;background:var(--charcoal);border-radius:var(--r-sm);padding:2px;}
.lang-btn{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:500;cursor:pointer;transition:all var(--tr);color:var(--muted);border:none;background:transparent;font-family:inherit;}
.lang-btn.active{background:var(--dark);color:var(--white);}
.login-policies{display:flex;gap:12px;}
.policy-link{font-size:11px;color:var(--mid);cursor:pointer;text-decoration:none;transition:color var(--tr);}
.policy-link:hover{color:var(--warm-gold);}

/* ============ APP SHELL ============ */
#app-shell{display:none;min-height:100vh;}
#app-shell.visible{display:flex;}

/* ============ SIDEBAR ============ */
.sidebar{width:var(--sw);background:var(--black);flex-shrink:0;display:flex;flex-direction:column;transition:width var(--tr),transform var(--tr);position:fixed;left:0;top:0;bottom:0;z-index:100;overflow:hidden;}
.sidebar.collapsed{width:var(--sw-c);}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--charcoal);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sidebar-logo-mark{width:30px;height:30px;border-radius:var(--r-sm);overflow:hidden;background:var(--warm-orange);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--white);flex-shrink:0;}
.sidebar-brand-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;}
.sidebar-brand-sub{font-size:10px;color:var(--mid);white-space:nowrap;margin-top:1px;}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;overflow-x:hidden;}
.nav-section-label{font-size:10px;font-weight:600;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;padding:8px 10px 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--tr);}
.sidebar.collapsed .nav-section-label{opacity:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);color:var(--muted);cursor:pointer;margin-bottom:2px;transition:all var(--tr);white-space:nowrap;overflow:hidden;position:relative;}
.nav-item:hover{background:var(--charcoal);color:var(--light);}
.nav-item.active{background:rgba(200,134,74,.15);color:var(--warm-gold);}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;border-radius:0 2px 2px 0;background:var(--warm-orange);}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item-label{font-size:13px;}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--charcoal);flex-shrink:0;}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);overflow:hidden;}
.sidebar-avatar{width:30px;height:30px;border-radius:50%;background:var(--warm-orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--white);flex-shrink:0;overflow:hidden;}
.avatar-edit-wrap{position:relative;flex-shrink:0;cursor:pointer;}
.avatar-edit-badge{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--warm-orange);border:2px solid var(--dark);display:flex;align-items:center;justify-content:center;}
.avatar-edit-badge svg{width:7px;height:7px;stroke:var(--white);}
.sidebar-user-name{font-size:12px;font-weight:500;color:var(--light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{font-size:10px;color:var(--mid);white-space:nowrap;}
.sidebar-collapse-btn{width:100%;padding:7px 10px;margin-top:4px;background:transparent;border:none;cursor:pointer;color:var(--mid);display:flex;align-items:center;gap:10px;border-radius:var(--r);transition:all var(--tr);font-family:inherit;font-size:12px;overflow:hidden;white-space:nowrap;}
.sidebar-collapse-btn:hover{background:var(--charcoal);color:var(--light);}
.sidebar-collapse-btn svg{width:16px;height:16px;flex-shrink:0;}

/* ============ SYNC BAR ============ */
.sync-bar{margin-top:4px;padding:8px 10px;border:1px solid var(--charcoal);border-radius:var(--r);background:rgba(255,255,255,.03);}
.sync-status{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--mid);flex-shrink:0;transition:background .3s;}
.sync-dot.online{background:#3D8A5E;}
.sync-dot.syncing{background:#D4A55A;animation:pulse .9s infinite;}
.sync-dot.error{background:var(--danger);}
.sync-dot.offline{background:var(--mid);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-status-text{font-size:10px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.realtime-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#3D8A5E;background:rgba(61,138,94,.12);padding:1px 6px;border-radius:10px;margin-top:2px;}
.realtime-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#3D8A5E;animation:pulse .9s infinite;}
.sync-sql-block{background:var(--charcoal);border-radius:var(--r-sm);padding:8px 10px;font-family:monospace;font-size:10px;color:#D4A55A;margin-top:6px;white-space:pre;overflow-x:auto;line-height:1.6;}

/* ============ MAIN AREA ============ */
.main-area{flex:1;display:flex;flex-direction:column;margin-left:var(--sw);transition:margin-left var(--tr);min-width:0;}
.main-area.sidebar-collapsed{margin-left:var(--sw-c);}
.topbar{height:var(--tbh);background:var(--white);border-bottom:1px solid var(--pale);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--pale);}
.topbar-hamburger{display:none;padding:6px;border:none;background:transparent;cursor:pointer;border-radius:var(--r);color:var(--mid);}
.topbar-hamburger svg{width:20px;height:20px;display:block;}
.topbar-title{font-size:15px;font-weight:600;color:var(--dark);}
.topbar-lang{display:flex;gap:2px;background:var(--pale);border-radius:var(--r-sm);padding:2px;}
.topbar-lang-btn{padding:3px 8px;border-radius:3px;font-size:11px;font-weight:500;cursor:pointer;transition:all var(--tr);color:var(--muted);border:none;background:transparent;font-family:inherit;}
.topbar-lang-btn.active{background:var(--white);color:var(--dark);box-shadow:var(--sh-sm);}
.page-content{flex:1;padding:24px;overflow-y:auto;}
@media(max-width:768px){.page-content{padding:16px;}}
@media(max-width:480px){.page-content{padding:12px;}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-h1{font-size:20px;font-weight:600;color:var(--black);}
.page-desc{font-size:13px;color:var(--muted);}

/* ============ SEARCH ============ */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-input-wrap{position:relative;flex:1;min-width:200px;}
.search-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none;}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--light);border-radius:var(--r);background:var(--white);font-family:inherit;font-size:13px;outline:none;transition:border-color var(--tr);}
.search-input:focus{border-color:var(--warm-orange);}
.filter-select{padding:8px 12px;border:1px solid var(--light);border-radius:var(--r);background:var(--white);font-family:inherit;font-size:13px;outline:none;cursor:pointer;color:var(--dark);}

/* ============ DETAIL PANEL ============ */
.detail-panel-overlay{position:fixed;inset:0;background:rgba(17,17,16,.4);z-index:199;display:none;}
.detail-panel-overlay.visible{display:block;}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:460px;max-width:95vw;background:var(--white);border-left:1px solid var(--pale);box-shadow:var(--sh-lg);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;}
.detail-panel.open{transform:translateX(0);}
.detail-header{padding:18px 20px;border-bottom:1px solid var(--pale);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.detail-company-name{font-size:16px;font-weight:600;color:var(--black);}
.detail-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--pale);overflow-x:auto;flex-shrink:0;}
.detail-tab{padding:9px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--tr);white-space:nowrap;}
.detail-tab:hover{color:var(--dark);}
.detail-tab.active{color:var(--warm-orange);border-bottom-color:var(--warm-orange);}
.detail-body{flex:1;overflow-y:auto;padding:20px;}
.detail-section{margin-bottom:22px;}
.detail-section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--pale);}
.detail-field{display:flex;gap:8px;margin-bottom:9px;}
.detail-field-label{font-size:12px;color:var(--muted);width:88px;flex-shrink:0;padding-top:1px;}
.detail-field-val{font-size:13px;color:var(--dark);flex:1;}
.detail-footer{padding:14px 20px;border-top:1px solid var(--pale);display:flex;gap:8px;flex-wrap:wrap;}
.timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:12px;padding-bottom:16px;position:relative;}
.timeline-item::before{content:'';position:absolute;left:7px;top:18px;bottom:0;width:1px;background:var(--pale);}
.timeline-item:last-child::before{display:none;}
.timeline-dot{width:16px;height:16px;border-radius:50%;background:var(--warm-sand);border:2px solid var(--warm-orange);flex-shrink:0;margin-top:2px;}
.timeline-date{font-size:11px;color:var(--muted);}
.timeline-text{font-size:13px;color:var(--dark);margin-top:2px;}
.timeline-author{font-size:11px;color:var(--muted);margin-top:2px;}

/* ============ MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(17,17,16,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r-xl);padding:28px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.modal-title{font-size:16px;font-weight:600;color:var(--black);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
.policy-content{font-size:13px;color:var(--dark);line-height:1.8;max-height:60vh;overflow-y:auto;}
.policy-content h3{font-size:14px;font-weight:600;margin:16px 0 6px;color:var(--black);}
.policy-content p{margin-bottom:10px;color:var(--mid);}

/* ============ ACCOUNT ROW ============ */
.account-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r);border:1px solid var(--pale);margin-bottom:8px;background:var(--white);transition:border-color var(--tr);}
.account-row:hover{border-color:var(--light);}
.account-actions{margin-left:auto;display:flex;gap:6px;}

/* ============ SETTINGS ============ */
.settings-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--pale);overflow:hidden;margin-bottom:20px;}
.settings-card-header{padding:16px 20px;border-bottom:1px solid var(--pale);background:var(--cream);display:flex;align-items:center;gap:10px;}
.settings-card-title{font-size:14px;font-weight:600;color:var(--dark);}
.settings-card-body{padding:20px;}

/* ============ TABS ============ */
.tab-list{display:flex;gap:0;border-bottom:1px solid var(--pale);margin-bottom:24px;overflow-x:auto;}
.tab-item{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--tr);white-space:nowrap;}
.tab-item:hover{color:var(--dark);}
.tab-item.active{color:var(--warm-orange);border-bottom-color:var(--warm-orange);}

/* ============ LOADING SKELETON ============ */
.skeleton{background:linear-gradient(90deg,var(--pale) 25%,var(--cream) 50%,var(--pale) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--r-sm);}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-row{height:44px;margin-bottom:8px;border-radius:var(--r);}

/* ============ TOAST ============ */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast{background:var(--dark);color:var(--white);padding:11px 16px;border-radius:var(--r);font-size:13px;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:8px;animation:slideIn .3s ease;border-left:3px solid var(--warm-orange);}
.toast.success{border-left-color:var(--success);}
.toast.danger{border-left-color:var(--danger);}
.toast.warning{border-left-color:var(--warning);}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ============ SIDEBAR OVERLAY (MOBILE) ============ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none;}
.sidebar-overlay.visible{display:block;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:var(--sw)!important;box-shadow:var(--sh-lg);}
  .sidebar.mobile-open{transform:translateX(0);}
  .main-area{margin-left:0!important;}
  .topbar-hamburger{display:flex;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .topbar-lang{display:none;}
  .page-header{flex-direction:column;align-items:flex-start;}
  .detail-panel{width:100%;}
}
@media(max-width:480px){
  .stat-num{font-size:22px;}
  .page-h1{font-size:17px;}
  .modal{padding:20px;}
  .login-box{margin:12px;}
  .login-header,.login-form-area{padding-left:20px;padding-right:20px;}
  .login-footer{padding-left:20px;padding-right:20px;flex-wrap:wrap;gap:8px;}
}

/* ============ CUST AVATAR ============ */
.cust-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white);flex-shrink:0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.4;}
.empty-title{font-size:15px;font-weight:500;color:var(--mid);margin-bottom:6px;}
</style>

<script>
/* ================================================================
   STATE & LOCAL DEFAULTS
   ================================================================ */
const DEFAULT_STATE = {
  lang: 'en',
  sidebarCollapsed: false,
  currentPage: 'dashboard',
  currentUser: null,
  settings: {
    companyName: 'Bazaar Textile',
    companySub: 'CRM Management System',
    logo: null,
    tagline: 'Down jacket & outdoor sportswear fabric specialists',
    headerText: 'Bazaar Textile — Global Fabric Solutions',
    footerText: '© 2025 Bazaar Textile Co., Ltd. All rights reserved.',
    privacyPolicy: `<h3>Privacy Policy</h3><p>Last updated: January 2025</p><h3>1. Information We Collect</h3><p>Bazaar Textile CRM collects business contact information, company details, and transaction records entered by authorized users for the purpose of customer relationship management.</p><h3>2. How We Use Information</h3><p>All customer data is used solely for internal business operations including sales tracking, follow-up communications, and business analytics. We do not sell or share customer data with third parties.</p><h3>3. Data Protection</h3><p>Customer information is stored securely with access restricted to authorized personnel only. All data transmissions use industry-standard encryption protocols.</p><h3>4. User Rights</h3><p>Users may request to view, correct, or delete their data by contacting the system administrator.</p><h3>5. Contact</h3><p>For privacy-related inquiries, contact: admin@bazaartextile.com</p>`,
    securityPolicy: `<h3>Security Policy</h3><p>Last updated: January 2025</p><h3>1. Account Security</h3><p>All users must maintain confidential passwords. Sharing login credentials is strictly prohibited.</p><h3>2. Access Control</h3><p>The system enforces role-based access control. Administrators can view all records. Sales staff can only access customers assigned to them.</p><h3>3. Data Integrity</h3><p>Sales staff may add new customer records but cannot modify or delete existing records. Only administrators have full edit and delete privileges.</p><h3>4. Audit Log</h3><p>All data modifications are logged with timestamps and user identification for security auditing purposes.</p>`
  },
  // Local-only accounts (fallback when Supabase is not configured)
  accounts: [
    { id: 'admin', username: 'admin', password: 'basha2025', role: 'superadmin', name: 'System Admin', status: 'active', createdAt: '2025-01-01', avatar: null },
    { id: 'mgr01', username: 'manager01', password: 'mgr@2025', role: 'admin', name: 'Manager Li', status: 'active', createdAt: '2025-01-01', avatar: null },
    { id: 'sales01', username: 'sales_wang', password: 'sales@2025', role: 'sales', name: 'Wang Lei', status: 'active', createdAt: '2025-01-01', avatar: null },
    { id: 'sales02', username: 'sales_li', password: 'sales@2025', role: 'sales', name: 'Li Na', status: 'active', createdAt: '2025-01-10', avatar: null },
    { id: 'sales03', username: 'sales_zhang', password: 'sales@2025', role: 'sales', name: 'Zhang Wei', status: 'active', createdAt: '2025-01-15', avatar: null }
  ]
};

let STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));

// Per-table in-memory cache (populated from Supabase)
const DB = {
  customers: [],
  contacts: [],    // { id, customer_id, name, position, email, whatsapp, linkedin }
  products: [],    // { id, code, name, category, composition, feature, image_url }
  follow_ups: [],  // { id, customer_id, content, next_action, follow_date }
  quotations: [],  // { id, customer_id, product, price, status }
  samples: [],     // { id, customer_id, product, tracking, status }
  orders: []       // { id, customer_id, product, quantity, amount }
};

/* ================================================================
   SUPABASE CONFIG & REST CLIENT
   ================================================================ */
// Built-in default Supabase project — the CRM auto-connects to this database
// on load so every user (admin or sales) shares the same live, synced data.
const DEFAULT_SUPA = {
  url: 'https://bqrirktdgltmfuriyaof.supabase.co',
  anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxcmlya3RkZ2x0bWZ1cml5YW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MDM0NTcsImV4cCI6MjEwMDE3OTQ1N30.snsS8Sjit-3HCkLqRRInhXeZxFhsQNCf1eBm7OgAM9o'
};
let SUPA = { ...DEFAULT_SUPA, configured: true };
let realtimeSocket = null;
let realtimeChannels = {};
let autoRefreshTimer = null;

function loadSupaConfig() {
  // Prefer a manually-saved override (set via the Sync Settings modal), if any.
  try {
    const raw = localStorage.getItem('bt_supa_config');
    if (raw) {
      const c = JSON.parse(raw);
      if (c.url && c.anonKey) { SUPA = { ...c, configured: true }; return; }
    }
  } catch(e) {}
  // Otherwise fall back to the built-in project so the app is connected out of the box.
  SUPA = { ...DEFAULT_SUPA, configured: true };
}
function saveSupaConfig(cfg) {
  SUPA = { url: cfg.url.replace(/\/$/, ''), anonKey: cfg.anonKey, configured: true };
  localStorage.setItem('bt_supa_config', JSON.stringify(SUPA));
}
function clearSupaConfig() {
  SUPA = { url: '', anonKey: '', configured: false };
  localStorage.removeItem('bt_supa_config');
}

// Load local settings / accounts from localStorage
function loadLocal() {
  try {
    const s = localStorage.getItem('bt_crm_local');
    if (s) { const d = JSON.parse(s); STATE.settings = { ...STATE.settings, ...d.settings }; if (d.accounts) STATE.accounts = d.accounts; STATE.lang = d.lang || 'en'; }
  } catch(e) {}
}
function saveLocal() {
  localStorage.setItem('bt_crm_local', JSON.stringify({ settings: STATE.settings, accounts: STATE.accounts, lang: STATE.lang }));
}

function supaH(extra) {
  return Object.assign({ 'apikey': SUPA.anonKey, 'Authorization': 'Bearer ' + SUPA.anonKey, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, extra || {});
}

// Core REST: GET from a table
async function sbGet(table, query) {
  const url = `${SUPA.url}/rest/v1/${table}?${query || ''}`;
  const r = await fetch(url, { headers: supaH() });
  if (!r.ok) throw new Error(`GET ${table} failed: ${r.status}`);
  return r.json();
}
// Core REST: INSERT
async function sbInsert(table, body) {
  const r = await fetch(`${SUPA.url}/rest/v1/${table}`, { method: 'POST', headers: supaH(), body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return r.json();
}
// Core REST: UPDATE (by id)
async function sbUpdate(table, id, body) {
  const r = await fetch(`${SUPA.url}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: supaH(), body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return r.json();
}
// Core REST: DELETE
async function sbDelete(table, id) {
  const r = await fetch(`${SUPA.url}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: supaH({ 'Prefer': 'return=minimal' }) });
  if (!r.ok) throw new Error(`DELETE ${table} id=${id} failed: ${r.status}`);
}
// Core REST: UPSERT (for settings/accounts table)
async function sbUpsert(table, body) {
  const r = await fetch(`${SUPA.url}/rest/v1/${table}?on_conflict=id`, { method: 'POST', headers: supaH({ 'Prefer': 'resolution=merge-duplicates,return=representation' }), body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return r.json();
}

/* ================================================================
   REALTIME (WebSocket) SUBSCRIPTIONS
   ================================================================ */
const RT_TABLES = ['customers','contacts','products','follow_ups','quotations','samples','orders'];

function connectRealtime() {
  if (!SUPA.configured) return;
  disconnectRealtime();
  // Supabase Realtime v2 WebSocket URL
  const wsUrl = SUPA.url.replace('https://','wss://').replace('http://','ws://') + '/realtime/v1/websocket?apikey=' + SUPA.anonKey + '&vsn=1.0.0';
  try {
    realtimeSocket = new WebSocket(wsUrl);
    realtimeSocket.onopen = () => {
      setSyncStatus('online');
      showRealtimeBadge(true);
      // Subscribe to all business tables
      RT_TABLES.forEach(tbl => {
        const ref = 'sub_' + tbl;
        const msg = { topic: `realtime:public:${tbl}`, event: 'phx_join', payload: { config: { broadcast: { self: false }, presence: {}, postgres_changes: [{ event: '*', schema: 'public', table: tbl }] } }, ref };
        realtimeSocket.send(JSON.stringify(msg));
        realtimeChannels[tbl] = ref;
      });
      // Heartbeat every 25s
      startHeartbeat();
    };
    realtimeSocket.onmessage = (evt) => {
      try { handleRealtimeMsg(JSON.parse(evt.data)); } catch(e) {}
    };
    realtimeSocket.onclose = () => {
      showRealtimeBadge(false);
      setSyncStatus(SUPA.configured ? 'error' : 'offline');
      stopHeartbeat();
      // Auto-reconnect after 5s
      setTimeout(() => { if (SUPA.configured && STATE.currentUser) connectRealtime(); }, 5000);
    };
    realtimeSocket.onerror = () => { setSyncStatus('error'); };
  } catch(e) { console.warn('Realtime WS failed:', e); }
}

let heartbeatTimer = null;
let heartbeatRef = 0;
function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (realtimeSocket && realtimeSocket.readyState === WebSocket.OPEN) {
      realtimeSocket.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: ++heartbeatRef }));
    }
  }, 25000);
}
function stopHeartbeat() { if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; } }
function disconnectRealtime() {
  stopHeartbeat();
  if (realtimeSocket) { try { realtimeSocket.close(); } catch(e) {} realtimeSocket = null; }
  realtimeChannels = {};
  showRealtimeBadge(false);
}

function handleRealtimeMsg(msg) {
  if (!msg || !msg.payload) return;
  const payload = msg.payload;
  // postgres_changes event
  if (payload.data && payload.data.table) {
    const tbl = payload.data.table;
    const evtType = payload.data.type; // INSERT / UPDATE / DELETE
    const record = payload.data.record || payload.data.old_record;
    if (!DB[tbl]) return;
    if (evtType === 'INSERT') {
      DB[tbl] = [record, ...DB[tbl].filter(r => r.id !== record.id)];
    } else if (evtType === 'UPDATE') {
      DB[tbl] = DB[tbl].map(r => r.id === record.id ? { ...r, ...record } : r);
    } else if (evtType === 'DELETE') {
      DB[tbl] = DB[tbl].filter(r => r.id !== record.id);
    }
    // Re-render current page if relevant
    if (tbl === 'customers' || tbl === 'contacts' || tbl === 'follow_ups' || tbl === 'orders' || tbl === 'samples' || tbl === 'quotations') {
      if (['dashboard','customers','followup'].includes(STATE.currentPage)) renderPage(STATE.currentPage);
      // Refresh open detail panel
      if (STATE.openDetailId) refreshDetailIfOpen(State.openDetailId);
    }
    showToast(`🔄 ${tbl.replace('_',' ')} updated`, '');
  }
}

function showRealtimeBadge(on) {
  const w = el('realtime-badge-wrap');
  if (!w) return;
  w.innerHTML = on ? `<div class="realtime-badge">Realtime Live</div>` : '';
}

/* ================================================================
   LOAD ALL TABLES (parallel fetch)
   ================================================================ */
async function loadAllTables(opts) {
  if (!SUPA.configured) return false;
  opts = opts || {};
  if (!opts.silent) setSyncStatus('syncing');
  try {
    const visFilter = isAdmin() ? '' : `&assigned_to=eq.${STATE.currentUser.id}`;
    const [customers, contacts, products, follow_ups, quotations, samples, orders] = await Promise.all([
      sbGet('customers', 'order=created_at.desc' + visFilter),
      sbGet('contacts', 'order=created_at.desc'),
      sbGet('products', 'order=created_at.desc'),
      sbGet('follow_ups', 'order=follow_date.desc'),
      sbGet('quotations', 'order=created_at.desc'),
      sbGet('samples', 'order=created_at.desc'),
      sbGet('orders', 'order=created_at.desc')
    ]);
    DB.customers = customers || [];
    DB.contacts = contacts || [];
    DB.products = products || [];
    DB.follow_ups = follow_ups || [];
    DB.quotations = quotations || [];
    DB.samples = samples || [];
    DB.orders = orders || [];
    setSyncStatus('online');
    return true;
  } catch(e) {
    console.warn('loadAllTables failed:', e);
    setSyncStatus('error');
    return false;
  }
}

// Load only accounts + settings (crm_meta table)
async function loadMeta() {
  if (!SUPA.configured) return false;
  try {
    const rows = await sbGet('crm_meta', 'id=eq.default&select=*');
    if (rows && rows.length) {
      const m = rows[0];
      if (m.accounts) STATE.accounts = m.accounts;
      if (m.settings) STATE.settings = { ...STATE.settings, ...m.settings };
      saveLocal();
    }
    return true;
  } catch(e) { return false; }
}
async function saveMeta() {
  if (!SUPA.configured) { saveLocal(); return; }
  try {
    await sbUpsert('crm_meta', [{ id: 'default', accounts: STATE.accounts, settings: STATE.settings, updated_at: new Date().toISOString() }]);
    saveLocal();
  } catch(e) { console.warn('saveMeta failed:', e); saveLocal(); }
}

/* ================================================================
   SYNC STATUS UI
   ================================================================ */
function setSyncStatus(status) {
  const dot = el('sync-dot'), text = el('sync-status-text');
  if (!dot || !text) return;
  dot.className = 'sync-dot ' + (status || 'offline');
  const map = { online: '✓ Connected', syncing: 'Syncing…', error: 'Sync error', offline: 'Not connected' };
  text.textContent = SUPA.configured ? (map[status] || map.offline) : 'No DB configured';
}
function renderSyncBarUI() {
  const btn = el('btn-sync-settings');
  if (btn) btn.classList.toggle('hidden', !isSuperAdmin());
  setSyncStatus(SUPA.configured ? 'online' : 'offline');
}
async function manualRefresh() {
  if (!SUPA.configured) { showToast('Connect Supabase first', 'warning'); return; }
  setSyncStatus('syncing');
  const ok = await loadAllTables();
  if (ok) { renderPage(STATE.currentPage); showToast('Data refreshed', 'success'); }
  else showToast('Refresh failed', 'danger');
}

/* ================================================================
   SYNC SETTINGS MODAL (super admin)
   ================================================================ */
function openSyncSettings() {
  if (!isSuperAdmin()) return;
  el('modal-title').textContent = 'Supabase Database Setup';
  el('modal-body').innerHTML = `
    <div style="margin-bottom:16px;padding:12px;background:var(--info-bg);border-radius:var(--r);font-size:12px;color:var(--info);line-height:1.7;">
      <strong>Multi-table architecture</strong> — Data is stored in 7 normalized tables.<br>
      Run this SQL in your Supabase SQL Editor first, then enter connection details below.
    </div>
    <div class="sync-sql-block">-- 1. Settings & accounts meta table
create table if not exists crm_meta (
  id text primary key,
  accounts jsonb,
  settings jsonb,
  updated_at timestamptz default now()
);
alter table crm_meta enable row level security;
create policy "rw" on crm_meta for all using (true) with check (true);

-- 2. Customers
create table if not exists customers (
  id uuid primary key default gen_random_uuid(),
  company_name text, country text, website text,
  source text, status text default 'New', level text default 'C',
  notes text, assigned_to text, created_at timestamptz default now()
);
alter table customers enable row level security;
create policy "rw" on customers for all using (true) with check (true);
alter publication supabase_realtime add table customers;

-- 3. Contacts
create table if not exists contacts (
  id uuid primary key default gen_random_uuid(),
  customer_id uuid references customers(id) on delete cascade,
  name text, position text, email text,
  whatsapp text, linkedin text, created_at timestamptz default now()
);
alter table contacts enable row level security;
create policy "rw" on contacts for all using (true) with check (true);
alter publication supabase_realtime add table contacts;

-- 4. Products
create table if not exists products (
  id uuid primary key default gen_random_uuid(),
  code text, name text, category text,
  composition text, feature text, image_url text,
  created_at timestamptz default now()
);
alter table products enable row level security;
create policy "rw" on products for all using (true) with check (true);
alter publication supabase_realtime add table products;

-- 5. Follow-Ups
create table if not exists follow_ups (
  id uuid primary key default gen_random_uuid(),
  customer_id uuid references customers(id) on delete cascade,
  content text, next_action text, author_id text, author_name text,
  follow_date timestamptz default now()
);
alter table follow_ups enable row level security;
create policy "rw" on follow_ups for all using (true) with check (true);
alter publication supabase_realtime add table follow_ups;

-- 6. Quotations
create table if not exists quotations (
  id uuid primary key default gen_random_uuid(),
  customer_id uuid references customers(id) on delete cascade,
  product text, price text, status text, created_at timestamptz default now()
);
alter table quotations enable row level security;
create policy "rw" on quotations for all using (true) with check (true);
alter publication supabase_realtime add table quotations;

-- 7. Samples
create table if not exists samples (
  id uuid primary key default gen_random_uuid(),
  customer_id uuid references customers(id) on delete cascade,
  product text, tracking text, status text, created_at timestamptz default now()
);
alter table samples enable row level security;
create policy "rw" on samples for all using (true) with check (true);
alter publication supabase_realtime add table samples;

-- 8. Orders
create table if not exists orders (
  id uuid primary key default gen_random_uuid(),
  customer_id uuid references customers(id) on delete cascade,
  product text, quantity text, amount numeric, created_at timestamptz default now()
);
alter table orders enable row level security;
create policy "rw" on orders for all using (true) with check (true);
alter publication supabase_realtime add table orders;</div>
    <div class="form-group" style="margin-top:16px;"><label class="form-label">Supabase Project URL</label>
      <input class="form-input" id="sb-url" placeholder="https://xxxxxxxx.supabase.co" value="${SUPA.url||''}"></div>
    <div class="form-group" style="margin-top:12px;"><label class="form-label">Anon / Public Key</label>
      <input class="form-input" id="sb-key" placeholder="eyJhbGciOi…" value="${SUPA.anonKey||''}"></div>
    <div id="sync-test-result" style="font-size:12px;margin-top:10px;min-height:18px;"></div>
  `;
  el('modal-footer').innerHTML = `
    ${SUPA.configured ? `<button class="btn btn-danger-outline" onclick="disconnectSupa()">Disconnect</button>` : ''}
    <button class="btn btn-secondary" onclick="testSupa()">Test Connection</button>
    <button class="btn btn-primary" onclick="saveSupa()">Connect & Sync</button>
  `;
  openModal();
}
async function testSupa() {
  const url = (el('sb-url').value||'').trim().replace(/\/$/,'');
  const key = (el('sb-key').value||'').trim();
  const r = el('sync-test-result');
  if (!url||!key) { r.innerHTML=`<span style="color:var(--danger)">Please fill in both fields</span>`; return; }
  r.innerHTML=`<span style="color:var(--muted)">Testing…</span>`;
  try {
    const res = await fetch(`${url}/rest/v1/crm_meta?limit=1`, { headers: { apikey: key, Authorization: 'Bearer ' + key } });
    if (res.ok) r.innerHTML=`<span style="color:var(--success)">✓ Connection successful! Tables ready.</span>`;
    else r.innerHTML=`<span style="color:var(--danger)">Connection failed (${res.status}) — ensure SQL was executed in Supabase</span>`;
  } catch(e) { r.innerHTML=`<span style="color:var(--danger)">Connection error: ${e.message}</span>`; }
}
async function saveSupa() {
  const url = (el('sb-url').value||'').trim().replace(/\/$/,'');
  const key = (el('sb-key').value||'').trim();
  if (!url||!key) { showToast('Fill in URL and key', 'danger'); return; }
  saveSupaConfig({ url, anonKey: key });
  closeModal();
  setSyncStatus('syncing');
  await saveMeta();
  await loadAllTables();
  connectRealtime();
  renderSyncBarUI();
  renderPage(STATE.currentPage);
  showToast('Connected! Realtime sync active ✓', 'success');
}
function disconnectSupa() {
  clearSupaConfig();
  disconnectRealtime();
  closeModal();
  renderSyncBarUI();
  showToast('Disconnected from Supabase');
}

/* ================================================================
   HELPERS
   ================================================================ */
function el(id) { return document.getElementById(id); }
function avatarColor(s) { const c=['#C8864A','#5C8A6A','#4A70A8','#9A5E9A','#7A6A4A','#5A8A9A','#A85E4A','#6A8A5A']; let h=0; for(let x of s) h=x.charCodeAt(0)+((h<<5)-h); return c[Math.abs(h)%c.length]; }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function statusBadge(s) { const m={New:'info',Following:'warning',Closed:'success',Lost:'neutral'}; return `<span class="badge badge-${m[s]||'neutral'}">${t('status_'+s)||s}</span>`; }
function roleBadge(r) { if(r==='superadmin') return `<span class="badge badge-super">${t('superAdmin')}</span>`; if(r==='admin') return `<span class="badge badge-admin">${t('admin')}</span>`; return `<span class="badge badge-neutral">${t('sales')}</span>`; }
function isAdmin() { return STATE.currentUser && (STATE.currentUser.role==='admin'||STATE.currentUser.role==='superadmin'); }
function isSuperAdmin() { return STATE.currentUser && STATE.currentUser.role==='superadmin'; }
function salesName(id) { const a=STATE.accounts.find(a=>a.id===id); return a?a.name:id; }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString(STATE.lang==='zh'?'zh-CN':'en-GB', { year:'numeric',month:'short',day:'numeric' }); }
function fmtAmt(n) { return n != null ? '$' + parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:0}) : '—'; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function showToast(msg, type='') {
  const d=document.createElement('div'); d.className='toast '+type;
  d.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
  el('toast-container').appendChild(d); setTimeout(()=>d.remove(),3200);
}

// Visible customers based on role
function visibleCustomers() {
  if (isAdmin()) return DB.customers;
  return DB.customers.filter(c => c.assigned_to === STATE.currentUser.id);
}
// Related records for a customer id
function custContacts(id) { return DB.contacts.filter(c=>c.customer_id===id); }
function custFollowUps(id) { return DB.follow_ups.filter(f=>f.customer_id===id); }
function custQuotations(id) { return DB.quotations.filter(q=>q.customer_id===id); }
function custSamples(id) { return DB.samples.filter(s=>s.customer_id===id); }
function custOrders(id) { return DB.orders.filter(o=>o.customer_id===id); }

/* ================================================================
   AUTH
   ================================================================ */
async function doLogin() {
  const u = el('login-username').value.trim(), p = el('login-password').value;
  const btn = el('lbl-login-btn');
  btn.textContent = t('loginChecking'); btn.disabled = true;
  if (SUPA.configured) await loadMeta();
  btn.textContent = t('login'); btn.disabled = false;
  const acc = STATE.accounts.find(a=>a.username===u && a.password===p && a.status==='active');
  if (!acc) {
    el('login-error').style.display = 'block';
    el('login-username').style.borderColor = '#c0392b';
    return;
  }
  STATE.currentUser = acc;
  el('login-error').style.display = 'none';
  el('page-login').style.display = 'none';
  el('app-shell').classList.add('visible');
  await initApp();
}
el('login-password').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
el('login-username').addEventListener('keydown', e => { if (e.key==='Enter') el('login-password').focus(); });

function doLogout() {
  STATE.currentUser = null;
  disconnectRealtime();
  el('app-shell').classList.remove('visible');
  el('page-login').style.display = 'flex';
  el('login-username').value = ''; el('login-password').value = '';
  el('login-username').style.borderColor = '';
}

    { id:'customers', icon:'users', label:'nav_customers' },
    { id:'followup', icon:'bell', label:'nav_followup' },

/* ================================================================

   ================================================================ */
function renderSidebarAvatar() {
  const u=STATE.currentUser; if(!u) return;
  const box=el('sidebar-avatar'); if(!box) return;
  if(u.avatar) box.innerHTML=`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
  else { box.innerHTML=''; box.textContent=initials(u.name); }
}
function handleAvatarFile(input) {
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image(); img.onload=function(){
      const c=document.createElement('canvas'); c.width=c.height=160;
      const ctx=c.getContext('2d'); const sc=Math.max(160/img.width,160/img.height);
      ctx.drawImage(img,(160-img.width*sc)/2,(160-img.height*sc)/2,img.width*sc,img.height*sc);
      STATE.currentUser.avatar=c.toDataURL('image/jpeg',.85);
      const a=STATE.accounts.find(a=>a.id===STATE.currentUser.id); if(a) a.avatar=STATE.currentUser.avatar;
      saveMeta(); renderSidebarAvatar(); showToast('Avatar updated','success');
    }; img.src=e.target.result;
  }; reader.readAsDataURL(file); input.value='';
}

function renderDashboard() {
  const all = visibleCustomers();

  const closed = all.filter(c=>c.status==='Closed');
  const following = all.filter(c=>c.status==='Following'||c.status==='New');
  const activeAcc = STATE.accounts.filter(a=>a.status==='active'&&a.role==='sales').length;
  const recent = [...all].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,8);

  const stats = isAdmin() ? [
    { num:all.length, lbl:t('totalCustomers'), sub:`+${thisMonth.length} ${t('newThisMonth')}` },
    { num:closed.length, lbl:t('activeDeals'), sub:`${Math.round(closed.length/Math.max(all.length,1)*100)}% rate` },
    { num:following.length, lbl:t('pendingFollowUp'), sub:'Requiring attention' },

    </div>
    <div class="stat-grid">${stats.map(s=>`<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div><div class="stat-sub">${s.sub}</div></div>`).join('')}</div>
    <div class="card" style="padding:0;">
      <div style="padding:16px 20px 0;"><div class="card-title" style="margin-bottom:0;">${t('recentCustomers')}</div></div>
      <div class="table-wrap"><table class="table">
        <thead><tr>

          ${isAdmin()?`<th>${t('assignedTo')}</th>`:''}
          <th>${t('followUpTab')}</th><th>${t('ordersTab')}</th>
        </tr></thead>
        <tbody>${recent.map(c=>{
          const fus=custFollowUps(c.id).length, ords=custOrders(c.id).length;
          return `<tr onclick="openDetail('${c.id}')">
            <td><div style="display:flex;align-items:center;gap:10px;">
              <div class="cust-avatar" style="background:${avatarColor(c.company_name)}">${initials(c.company_name)}</div>
              <div><div style="font-weight:500;">${c.company_name}</div><div style="font-size:11px;color:var(--muted);">${c.level||''} · ${c.source||''}</div></div>
            </div></td>
            <td>${c.country||'—'}</td>

            ${isAdmin()?`<td style="font-size:12px;">${salesName(c.assigned_to)}</td>`:''}

function openEditCustomer(id) {

async function saveNewCustomer() {
  const company=el('f-company').value.trim();
  if(!company){showToast('Company name is required','danger');return;}
  const body={company_name:company,country:el('f-country').value.trim(),status:el('f-status').value,level:el('f-level').value,source:el('f-source').value.trim(),website:el('f-website').value.trim(),notes:el('f-note').value.trim(),assigned_to:el('f-sales').value};
  if(!isAdmin()) body.assigned_to=STATE.currentUser.id;
  if(SUPA.configured){
    try{const rows=await sbInsert('customers',body);if(rows&&rows[0])DB.customers.unshift(rows[0]);}catch(e){showToast('Save failed: '+e.message,'danger');return;}
  } else {
    DB.customers.unshift({...body,id:genId(),created_at:new Date().toISOString()});
  }
  closeModal();renderCustomers();showToast(t('customerAdded'),'success');
}
async function saveEditCustomer(id) {
  if(!isAdmin()){showToast(t('readOnly'),'danger');return;}
  const body={company_name:el('f-company').value.trim(),country:el('f-country').value.trim(),status:el('f-status').value,level:el('f-level').value,source:el('f-source').value.trim(),website:el('f-website').value.trim(),notes:el('f-note').value.trim(),assigned_to:el('f-sales').value};
  if(SUPA.configured){try{const rows=await sbUpdate('customers',id,body);if(rows&&rows[0]){const i=DB.customers.findIndex(x=>x.id===id);if(i>=0)DB.customers[i]={...DB.customers[i],...rows[0]};}}catch(e){showToast('Save failed','danger');return;}}
  else{const i=DB.customers.findIndex(x=>x.id===id);if(i>=0)DB.customers[i]={...DB.customers[i],...body};}
  closeModal();renderCustomers();showToast(t('customerSaved'),'success');
}
function confirmDeleteCustomer(id) {
  if(!isAdmin()){return;}
  const c=DB.customers.find(x=>x.id===id);
  el('modal-title').textContent=t('deleteCustomer');
  el('modal-body').innerHTML=`<p style="color:var(--mid);">${t('confirmDelete')}<br><strong>${c.company_name}</strong><br><br><span style="font-size:12px;color:var(--danger);">This will also delete all related contacts, follow-ups, quotations, samples, and orders.</span></p>`;
  el('modal-footer').innerHTML=`<button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-danger-outline" onclick="deleteCustomer('${id}')">${t('deleteCustomer')}</button>`;
  openModal();
}
async function deleteCustomer(id) {
  if(!isAdmin()) return;
  if(SUPA.configured){try{await sbDelete('customers',id);}catch(e){showToast('Delete failed','danger');return;}}
  // Remove from all local caches
  DB.customers=DB.customers.filter(x=>x.id!==id);
  ['contacts','follow_ups','quotations','samples','orders'].forEach(t=>{DB[t]=DB[t].filter(r=>r.customer_id!==id);});
  closeModal();closeDetail();renderCustomers();showToast(t('customerDeleted'));
}

  if(SUPA.configured)try{await sbDelete('products',id);}catch(e){showToast('Delete failed','danger');return;}
  DB.products=DB.products.filter(x=>x.id!==id);
  renderProducts();showToast(t('productDeleted'));
}

      <div style="flex:1;min-width:0;">

        `:acc.role==='superadmin'?`<span class="badge badge-super">Protected</span>`:''}
      </div>

function openAddAccount() {
  el('modal-title').textContent=t('addAccount');
  el('modal-body').innerHTML=accountForm({});
  el('modal-footer').innerHTML=`<button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveNewAccount()">${t('save')}</button>`;
  openModal();
}
function openEditAccount(id) {
  const acc=STATE.accounts.find(a=>a.id===id); if(!acc) return;
  el('modal-title').textContent=t('editAccount');
  el('modal-body').innerHTML=accountForm(acc);
  el('modal-footer').innerHTML=`<button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveEditAccount('${id}')">${t('save')}</button>`;
  openModal();
}
function accountForm(acc) {
  return `<div class="form-row"><div class="form-group"><label class="form-label">Username *</label><input class="form-input" id="fa-u" value="${acc.username||''}"></div>
    <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="fa-n" value="${acc.name||''}"></div></div>
    <div class="form-group"><label class="form-label">${t('newPassword')} ${acc.username?'(blank = keep)':'*'}</label><input class="form-input" id="fa-p" type="password"></div>
    <div class="form-group"><label class="form-label">Role</label><select class="form-select" id="fa-r">
      <option value="sales" ${acc.role==='sales'?'selected':''}>${t('sales')}</option>
      ${isSuperAdmin()?`<option value="admin" ${acc.role==='admin'?'selected':''}>${t('admin')}</option>`:''}
    </select></div>`;
}
async function saveNewAccount() {
  const u=el('fa-u').value.trim(),n=el('fa-n').value.trim(),p=el('fa-p').value;
  if(!u||!n||!p){showToast('All fields required','danger');return;}
  if(STATE.accounts.find(a=>a.username===u)){showToast('Username taken','danger');return;}
  STATE.accounts.push({id:genId(),username:u,password:p,role:el('fa-r').value,name:n,status:'active',createdAt:new Date().toISOString().slice(0,10),avatar:null});
  await saveMeta();closeModal();renderAccounts();showToast(t('accountAdded'),'success');
}
async function saveEditAccount(id) {
  const acc=STATE.accounts.find(a=>a.id===id); if(!acc) return;
  const u=el('fa-u').value.trim(),n=el('fa-n').value.trim(),p=el('fa-p').value;
  if(!u||!n){showToast('Username & name required','danger');return;}
  if(STATE.accounts.find(a=>a.username===u&&a.id!==id)){showToast('Username taken','danger');return;}
  acc.username=u;acc.name=n;acc.role=el('fa-r').value;if(p)acc.password=p;
  await saveMeta();closeModal();renderAccounts();showToast(t('accountSaved'),'success');
}
async function toggleAccStatus(id) {
  const acc=STATE.accounts.find(a=>a.id===id); if(!acc) return;
  acc.status=acc.status==='active'?'disabled':'active';
  await saveMeta();renderAccounts();
}
async function deleteAcc(id) {
  STATE.accounts=STATE.accounts.filter(a=>a.id!==id);
  await saveMeta();renderAccounts();showToast('Account removed');
}

async function saveSettings() {
  STATE.settings.companyName=el('s-name').value;STATE.settings.companySub=el('s-sub').value;
  STATE.settings.tagline=el('s-tagline').value;STATE.settings.headerText=el('s-header').value;
  STATE.settings.footerText=el('s-footer').value;STATE.settings.privacyPolicy=el('s-privacy').value;
  STATE.settings.securityPolicy=el('s-security').value;
  await saveMeta();
  el('login-company-name').textContent=STATE.settings.companyName;
  el('login-company-sub').textContent=STATE.settings.companySub;
  el('login-tagline').textContent=STATE.settings.tagline;
  showToast(t('settingsSaved'),'success');
}

function handleLogoFile(input) {
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image(); img.onload=function(){
      const c=document.createElement('canvas');c.width=c.height=160;
      const ctx=c.getContext('2d');const sc=Math.max(160/img.width,160/img.height);
      ctx.drawImage(img,(160-img.width*sc)/2,(160-img.height*sc)/2,img.width*sc,img.height*sc);
      STATE.settings.logo=c.toDataURL('image/png');
      saveMeta();renderLogo();renderSettings();showToast('Logo updated','success');
    }; img.src=e.target.result;
  }; reader.readAsDataURL(file); input.value='';
}
async function removeLogo() { STATE.settings.logo=null; await saveMeta(); renderLogo(); renderSettings(); }

async function saveMyCredentials() {
  const me=STATE.currentUser;
  const curPass=el('acc-cur-pass').value,newUser=el('acc-new-user').value.trim(),newPass=el('acc-new-pass').value,confPass=el('acc-conf-pass').value;
  if(!curPass||curPass!==me.password){showToast(t('wrongCurrentPassword'),'danger');return;}
  if(!newUser){showToast(t('usernameRequired'),'danger');return;}
  if(STATE.accounts.find(a=>a.username===newUser&&a.id!==me.id)){showToast(t('usernameTakenMsg'),'danger');return;}
  if(newPass&&newPass!==confPass){showToast(t('passwordMismatchMsg'),'danger');return;}
  me.username=newUser;if(newPass)me.password=newPass;
  await saveMeta();showToast(t('credentialsSavedMsg'),'success');
}

/* ================================================================
   CSV EXPORT
   ================================================================ */
function exportCSV() {
  if(!isSuperAdmin()){showToast('Super admin only','danger');return;}
  const h=['Company','Country','Status','Level','Source','Website','Notes','Assigned To','Created','Follow-Ups','Quotations','Samples','Orders','Total Revenue'];
  const rows=DB.customers.map(c=>[c.company_name,c.country,c.status,c.level,c.source,c.website,c.notes,salesName(c.assigned_to),c.created_at,custFollowUps(c.id).length,custQuotations(c.id).length,custSamples(c.id).length,custOrders(c.id).length,custOrders(c.id).reduce((s,o)=>s+(parseFloat(o.amount)||0),0)]);
  let csv='\uFEFF'+h.map(x=>'"'+x+'"').join(',')+'\r\n';
  rows.forEach(r=>{csv+=r.map(x=>'"'+(x||'').toString().replace(/"/g,'""')+'"').join(',')+'\r\n';});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`${STATE.settings.companyName}_CRM_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('Exported ✓','success');
}
